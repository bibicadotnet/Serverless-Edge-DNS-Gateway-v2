name: Auto Deploy on Push

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Trigger Deploy Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "02 - Deploy Cloudflare Pages Only" --ref ${{ github.ref_name }} -R ${{ github.repository }}

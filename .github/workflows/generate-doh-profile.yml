# ==============================================================================
# CONFIGURATION GUIDE
# ==============================================================================
# Navigate to: Settings -> Secrets and variables -> Actions -> "Secrets" tab
#
#   DOH_DOMAIN            Your custom domain (e.g., dns.yourdomain.com)
#   PROFILE_CERT_EMAIL    Let's Encrypt registration email
#   PROFILE_CERT_CF_TOKEN Cloudflare API Token (with Edit zone DNS permission)
#   PROFILE_CERT_CF_ACCOUNT_ID  Cloudflare Account ID
# ==============================================================================

name: Generate Signed DoH Profile

on:
  workflow_dispatch:
    inputs:
      force_reset:
        description: 'Restore default settings (use /apple endpoint)'
        type: boolean
        default: false
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at 00:00

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DOH_DOMAIN: ${{ secrets.DOH_DOMAIN }}
      SKIP_ALL: 'false'
      REUSE_CERT: 'false'
      DID_COMMIT: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── PATH A: Force Reset ────────────────────────────────────────────────
      - name: Reset to Default Mode
        if: inputs.force_reset == true
        run: |
          python3 - << 'EOF'
          import re

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          default_li = (
            '\n                        '
            '<li><span class="step-num">1</span>Download and install '
            '<a href="/apple">this configuration profile</a> '
            '(iOS 14+ / macOS Big Sur+)</li>\n                        '
          )

          html = re.sub(
            r'(?<=<!-- APPLE_CONFIG_START -->).*?(?=<!-- APPLE_CONFIG_END -->)',
            default_li, html, flags=re.DOTALL
          )
          html = re.sub(
            r'(?<=<!-- MODAL_EXPIRY_START -->).*?(?=<!-- MODAL_EXPIRY_END -->)',
            'Current profile "Verified" status expires on: <strong>N/A</strong>',
            html, flags=re.DOTALL
          )

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print('Reset index.html to default mode.')
          EOF
          echo "SKIP_ALL=true" >> $GITHUB_ENV

      # ── PATH B: Check Prerequisites & Rate Limit ───────────────────────────
      - name: Check Prerequisites & Rate Limit
        if: env.SKIP_ALL != 'true'
        env:
          PROFILE_CERT_EMAIL: ${{ secrets.PROFILE_CERT_EMAIL }}
          PROFILE_CERT_CF_TOKEN: ${{ secrets.PROFILE_CERT_CF_TOKEN }}
          PROFILE_CERT_CF_ACCOUNT_ID: ${{ secrets.PROFILE_CERT_CF_ACCOUNT_ID }}
        run: |
          EXPIRY_FILE="mobileconfig/$DOH_DOMAIN.expiry.txt"
          MOBILECONFIG="mobileconfig/$DOH_DOMAIN.mobileconfig"

          # Rate limit: cert exists and is still fresh (>87 days left)
          if [ -f "$EXPIRY_FILE" ] && [ -f "$MOBILECONFIG" ]; then
            EXP_DATE=$(sed 's/.*expires on: //' "$EXPIRY_FILE")
            EXP_TS=$(date -d "$EXP_DATE" +%s 2>/dev/null || echo 0)
            REMAINING=$(( (EXP_TS - $(date +%s)) / 86400 ))

            if [ "$REMAINING" -gt 87 ]; then
              if grep -q "/mobileconfig/$DOH_DOMAIN.mobileconfig" index.html; then
                echo "::notice::Certificate valid ($REMAINING days left) and index.html is current. Nothing to do."
                echo "SKIP_ALL=true" >> $GITHUB_ENV && exit 0
              fi
              # Cert is fresh but index.html was reset — reuse cert, just update HTML
              echo "::notice::Reusing existing certificate to restore index.html."
              { echo "REUSE_CERT=true"; echo "CERT_EXPIRY=$EXP_DATE"; } >> $GITHUB_ENV
              exit 0
            fi
          fi

          # No usable cert — validate all secrets before proceeding
          if [ -z "$DOH_DOMAIN" ] && [ -z "$PROFILE_CERT_EMAIL" ]; then
            echo "::notice::No secrets configured. Running in default mode (/apple)."
            echo "SKIP_ALL=true" >> $GITHUB_ENV && exit 0
          fi

          for VAR in DOH_DOMAIN PROFILE_CERT_EMAIL PROFILE_CERT_CF_TOKEN PROFILE_CERT_CF_ACCOUNT_ID; do
            [ -z "${!VAR}" ] && echo "::error::$VAR is missing from Repository Secrets." && MISSING=true
          done
          [ "$MISSING" = true ] && exit 1

          HTTP_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $PROFILE_CERT_CF_TOKEN" \
            https://api.cloudflare.com/client/v4/user/tokens/verify)
          [ "$HTTP_STATUS" != "200" ] && echo "::error::Cloudflare token is invalid (HTTP $HTTP_STATUS)." && exit 1

          echo "All checks passed. Proceeding with certificate generation."

      # ── Generate, Issue, Sign ──────────────────────────────────────────────
      - name: Generate Unsigned MobileConfig
        if: env.SKIP_ALL != 'true' && env.REUSE_CERT != 'true'
        run: |
          python3 - << 'EOF'
          import uuid, os

          host = os.environ['DOH_DOMAIN']
          u1, u2, u3 = (str(uuid.uuid4()) for _ in range(3))

          profile = f"""<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>PayloadContent</key>
              <array>
                  <dict>
                      <key>DNSSettings</key>
                      <dict>
                          <key>DNSProtocol</key>
                          <string>HTTPS</string>
                          <key>ServerURL</key>
                          <string>https://{host}/dns-query</string>
                      </dict>
                      <key>PayloadDescription</key>
                      <string>Private DNS Resolution by {host}</string>
                      <key>PayloadDisplayName</key>
                      <string>{host} DoH</string>
                      <key>PayloadIdentifier</key>
                      <string>com.cloudflare.{u1}.dnsSettings.managed</string>
                      <key>PayloadType</key>
                      <string>com.apple.dnsSettings.managed</string>
                      <key>PayloadUUID</key>
                      <string>{u3}</string>
                      <key>PayloadVersion</key>
                      <integer>1</integer>
                      <key>ProhibitDisablement</key>
                      <false/>
                  </dict>
              </array>
              <key>PayloadDescription</key>
              <string>Private DNS Resolution by {host}
              - Privacy &amp; Zero Logs
              - Global Anycast Network
              - Smart Ad Blocking</string>
              <key>PayloadDisplayName</key>
              <string>{host} DoH</string>
              <key>PayloadIdentifier</key>
              <string>com.cloudflare.{u2}</string>
              <key>PayloadRemovalDisallowed</key>
              <false/>
              <key>PayloadType</key>
              <string>Configuration</string>
              <key>PayloadUUID</key>
              <string>{u2}</string>
              <key>PayloadVersion</key>
              <integer>1</integer>
          </dict>
          </plist>"""

          with open('unsigned.mobileconfig', 'w', encoding='utf-8') as f:
              f.write(profile)
          EOF

      - name: Issue Let's Encrypt Certificate
        if: env.SKIP_ALL != 'true' && env.REUSE_CERT != 'true'
        env:
          CF_Token: ${{ secrets.PROFILE_CERT_CF_TOKEN }}
          CF_Account_ID: ${{ secrets.PROFILE_CERT_CF_ACCOUNT_ID }}
        run: |
          curl -s https://get.acme.sh | sh -s email=${{ secrets.PROFILE_CERT_EMAIL }}
          ~/.acme.sh/acme.sh --issue --dns dns_cf -d $DOH_DOMAIN --server letsencrypt

      - name: Sign MobileConfig
        if: env.SKIP_ALL != 'true' && env.REUSE_CERT != 'true'
        run: |
          mkdir -p mobileconfig
          ~/.acme.sh/acme.sh --install-cert -d $DOH_DOMAIN \
            --cert-file cert.pem --key-file privkey.pem --fullchain-file fullchain.pem

          EXP_DATE=$(openssl x509 -enddate -noout -in cert.pem | cut -d= -f2)
          echo "CERT_EXPIRY=$EXP_DATE" >> $GITHUB_ENV
          echo "Certificate for $DOH_DOMAIN expires on: $EXP_DATE" > "mobileconfig/$DOH_DOMAIN.expiry.txt"

          openssl smime -sign \
            -signer cert.pem -inkey privkey.pem -certfile fullchain.pem \
            -nodetach -outform der \
            -in unsigned.mobileconfig \
            -out "mobileconfig/$DOH_DOMAIN.mobileconfig"

      # ── Update HTML & Commit ───────────────────────────────────────────────
      - name: Update index.html with Profile URL and Expiry
        if: env.SKIP_ALL != 'true'
        run: |
          python3 - << 'EOF'
          import re, os
          from datetime import datetime

          with open('index.html', 'r', encoding='utf-8') as f:
              html = f.read()
              
          domain = os.environ['DOH_DOMAIN']
          expiry = os.environ['CERT_EXPIRY'].strip()

          formatted = datetime.strptime(expiry, '%b %d %H:%M:%S %Y %Z').strftime('%m/%d/%Y')
          url = f'/mobileconfig/{domain}.mobileconfig'

          new_li = (
            f'\n                        '
            f'<li><span class="step-num">1</span>Download and install '
            f'<a href="{url}">this configuration profile</a> '
            f'(Expires: {formatted}) (iOS 14+ / macOS Big Sur+)</li>\n'
            f'                        <div style="margin: -8px 0 16px 30px;">\n'
            f'                            <button class="feature-cta" style="background: none; border: none; padding: 0; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 6px; font-size: 12.5px; opacity: 0.7;" onclick="showModal(\'verified-modal\')">\n'
            f'                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--success);"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>\n'
            f'                                Learn about "Verified" status &amp; expiry\n'
            f'                            </button>\n'
            f'                        </div>\n'
            f'                        '
          )

          html = re.sub(
            r'(?<=<!-- APPLE_CONFIG_START -->).*?(?=<!-- APPLE_CONFIG_END -->)',
            new_li, html, flags=re.DOTALL
          )
          html = re.sub(
            r'(?<=<!-- MODAL_EXPIRY_START -->).*?(?=<!-- MODAL_EXPIRY_END -->)',
            f'Current profile "Verified" status expires on: <strong>{formatted}</strong>',
            html, flags=re.DOTALL
          )

          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          with open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8') as f:
            f.write(f'FORMATTED_EXPIRY={formatted}\n')

          print(f'Updated index.html — profile URL: {url}, expiry: {formatted}')
          EOF

      - name: Commit and Push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          
          # Add files explicitly to prevent committing Private Keys
          [ -d "mobileconfig" ] && git add mobileconfig/
          [ -f "index.html" ] && git add index.html
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            if [ "${{ inputs.force_reset }}" = "true" ]; then
              MSG="Reset DoH Profile to default (/apple) mode"
            else
              MSG="Update DoH Profile for $DOH_DOMAIN (Expires: $FORMATTED_EXPIRY)"
            fi
            git commit -m "$MSG" && git push
            echo "DID_COMMIT=true" >> $GITHUB_ENV
          fi

      - name: Trigger Sync to All Nodes
        if: env.DID_COMMIT == 'true'
        run: gh workflow run sync_to_nodes.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}

# ==============================================================================
# CONFIGURATION GUIDE
# ==============================================================================
# Navigate to: Settings -> Secrets and variables -> Actions -> "Secrets" tab
#
#   SYNC_PAT  GitHub Personal Access Token (Classic or Fine-grained)
#             Scopes needed: 'repo' and 'workflow'
# ==============================================================================

name: Sync to All Nodes

on:
  workflow_dispatch:
  workflow_call:

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1          # Only need working tree, not full history
          persist-credentials: false

      - name: Load Node List
        run: |
          if [ ! -f database/nodes.json ]; then
            echo "::error::database/nodes.json not found."
            exit 1
          fi
          REPOS=$(jq -r '.[].name' database/nodes.json | tr '\n' ' ')
          echo "REPOS=$REPOS" >> $GITHUB_ENV
          echo "Found $(echo $REPOS | wc -w) nodes."

      - name: Prepare Clean Tree
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Strip admin components before delivery to nodes
          rm -rf .github database admin.html update_lists.sh LICENSE README.md

          # Stage deletions so write-tree reflects the clean state
          git add -A

      - name: Push to Node Repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}
        run: |
          REPOS="${{ env.REPOS }}"
          COUNT=$(echo "$REPOS" | wc -w)

          if [ -z "$REPOS" ] || [ "$COUNT" -eq 0 ]; then
            echo "No repositories to sync."
            exit 0
          fi

          echo "Starting sync for $COUNT nodes..."

          # Build orphan commit once — reused for every node push
          TREE=$(git write-tree)
          COMMIT=$(git commit-tree "$TREE" -m "Sync: $(date '+%Y-%m-%d %H:%M:%S UTC')")

          RESULT_DIR=$(mktemp -d)
          CONCURRENCY=30

          push_to_node() {
            local repo=$1
            local idx=$2
            local safe="${repo//\//_}"
            local url="https://x-access-token:${GH_TOKEN}@github.com/${repo}.git"

            local attempt=1
            while [ $attempt -le 2 ]; do
              if git push "$url" "${COMMIT}:refs/heads/main" --force --quiet 2>&1; then
                echo "[$idx/$COUNT] $repo: OK"
                touch "$RESULT_DIR/ok_$safe"
                return 0
              fi
              sleep 0.1
              attempt=$((attempt + 1))
            done

            echo "[$idx/$COUNT] $repo: FAILED"
            touch "$RESULT_DIR/fail_$safe"
          }

          export -f push_to_node
          export GH_TOKEN COMMIT COUNT RESULT_DIR

          # Sliding window: launch new job as soon as one finishes
          # Uses arithmetic counter — no subprocess fork per iteration
          active=0
          i=1
          for REPO_NAME in $REPOS; do
            push_to_node "$REPO_NAME" "$i" &
            active=$((active + 1))
            if [ $active -ge $CONCURRENCY ]; then
              wait -n
              active=$((active - 1))
            fi
            i=$((i + 1))
          done

          wait

          OK_COUNT=$(find "$RESULT_DIR" -name "ok_*" | wc -l)
          FAIL_COUNT=$(find "$RESULT_DIR" -name "fail_*" | wc -l)

          echo "======================================="
          echo " SYNC SUMMARY:"
          echo " - Success : $OK_COUNT / $COUNT"
          echo " - Failed  : $FAIL_COUNT / $COUNT"
          echo "======================================="

          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "Failed repos:"
            find "$RESULT_DIR" -name "fail_*" -printf "%f\n" | sed 's/^fail_//;s/_/\//g'
            exit 1
          fi

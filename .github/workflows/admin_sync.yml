# .github/workflows/admin_sync.yml
#
# Admin Sync Workflow
# ─────────────────────────────────────────────────────────────────────────────
# Triggered by the admin UI (workflow_dispatch).
# Reads database/pending_sync.json written by the UI, then:
#   1. Patches the Cloudflare Worker (functions/[[path]].js) with new config
#   2. Writes all custom rule files (blocklist, allowlist, redirect, etc.)
#   3. Patches update_lists.sh with the latest subscription URLs
#   4. Runs update_lists.sh to fetch & merge all external lists
#   5. Writes the final all_configs_snapshot.json for reconciliation
#   6. Commits & pushes everything in one atomic commit
#   7. Triggers 02_deploy-only.yml for immediate multi-account deployment
#
# Cloudflare Pages auto-deploys on every push to main, so no separate
# deploy step is needed. The UI polls this workflow's status to know when done.
# ─────────────────────────────────────────────────────────────────────────────

name: Admin Sync Workflow

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    name: Apply admin configuration & refresh lists
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 0. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1. Validate payload ────────────────────────────────────────────────
      - name: Validate pending_sync.json
        run: |
          if [ ! -f database/pending_sync.json ]; then
            echo "::error::database/pending_sync.json not found. Sync was not triggered correctly."
            exit 1
          fi
          echo "✅ Payload found. Requested at: $(jq -r '._requested // "unknown"' database/pending_sync.json)"
          echo "   Config keys: $(jq -r '.config | keys | join(", ")' database/pending_sync.json)"
          echo "   Blocklist URLs: $(jq -r '.urls.blocklist | length' database/pending_sync.json)"
          echo "   Allowlist URLs: $(jq -r '.urls.allowlist | length' database/pending_sync.json)"

      # ── 2. Apply config → worker + rule files + update_lists.sh ───────────
      - name: Apply configuration
        id: apply_config
        run: |
          node - <<'SCRIPT'
          const fs = require('fs');

          const pending = JSON.parse(fs.readFileSync('database/pending_sync.json', 'utf8'));
          const { config, custom_lists, urls } = pending;

          let listsChanged = true;
          if (fs.existsSync('database/all_configs_snapshot.json')) {
            try {
              const snapshot = JSON.parse(fs.readFileSync('database/all_configs_snapshot.json', 'utf8'));
              listsChanged = JSON.stringify(custom_lists) !== JSON.stringify(snapshot.custom_lists) ||
                             JSON.stringify(urls) !== JSON.stringify(snapshot.urls);
            } catch(e) {}
          }
          if (process.env.GITHUB_OUTPUT) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `lists_changed=${listsChanged}\n`);
          }
          console.log(`ℹ️ Lists changed: ${listsChanged}`);

          // ── 2a. Patch the Cloudflare Worker ──────────────────────────────
          let worker = fs.readFileSync('functions/[[path]].js', 'utf8');

          const patchVars = (section, cfg) => {
            for (const [key, val] of Object.entries(cfg)) {
              if (key === '_updated') continue;
              const regex = new RegExp(`(const\\s+${key}\\s+=\\s+)([^;]+)(;)`, 'g');
              const rep = typeof val === 'string'
                ? `'${val.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}'`
                : JSON.stringify(val);
              section = section.replace(regex, `$1${rep}$3`);
            }
            return section;
          };

          // Prefer patching only inside CONFIG_START / CONFIG_END markers
          const START = '// CONFIG_START';
          const END   = '// CONFIG_END';
          const si = worker.indexOf(START);
          const ei = worker.indexOf(END);
          if (si !== -1 && ei !== -1) {
            const before  = worker.substring(0, si + START.length);
            const section = worker.substring(si + START.length, ei);
            const after   = worker.substring(ei);
            worker = before + patchVars(section, config) + after;
          } else {
            worker = patchVars(worker, config); // fallback: patch entire file
          }
          fs.writeFileSync('functions/[[path]].js', worker);
          console.log('✅ Worker patched');

          // ── 2b. Write custom rule files ───────────────────────────────────
          fs.writeFileSync('rules/custom_blocklists.txt',  custom_lists.blocklist        ?? '');
          fs.writeFileSync('rules/custom_allowlists.txt',  custom_lists.allowlist        ?? '');
          fs.writeFileSync('rules/redirect_rules.txt',     custom_lists.redirect_rules   ?? '');
          fs.writeFileSync('rules/private_tlds.txt',       custom_lists.private_tlds     ?? '');
          fs.writeFileSync('rules/mullvad_upstream.txt',   custom_lists.mullvad_upstream ?? '');
          console.log('✅ Custom rule files written');

          // ── 2c. Patch update_lists.sh with new subscription URLs ──────────
          const patchSection = (text, startMark, endMark, content) => {
            const s = text.indexOf(startMark);
            const e = text.indexOf(endMark);
            if (s === -1 || e === -1) return text; // marker not found — skip safely
            return (
              text.substring(0, s + startMark.length) +
              '\n' + content + '\n' +
              text.substring(e)
            );
          };

          let script = fs.readFileSync('update_lists.sh', 'utf8');

          const blockUrls = (urls.blocklist || []).filter(Boolean);
          script = patchSection(
            script,
            '# EXTERNAL_BLOCKLIST_START',
            '# EXTERNAL_BLOCKLIST_END',
            blockUrls.length
              ? '  curl -fsSL --max-time 60 \\\n  ' + blockUrls.join(' \\\n  ')
              : '  # No external blocklists configured'
          );

          const allowUrls = (urls.allowlist || []).filter(Boolean);
          script = patchSection(
            script,
            '# EXTERNAL_ALLOWLIST_START',
            '# EXTERNAL_ALLOWLIST_END',
            allowUrls.length
              ? '  curl -fsSL --max-time 60 \\\n  ' + allowUrls.join(' \\\n  ')
              : '  # No external allowlists configured'
          );

          fs.writeFileSync('update_lists.sh', script);
          console.log('✅ update_lists.sh patched with', blockUrls.length, 'blocklist URL(s) and', allowUrls.length, 'allowlist URL(s)');
          SCRIPT

      # ── 3. Fetch & merge all external subscription lists ───────────────────
      - name: Fetch and merge external lists
        if: steps.apply_config.outputs.lists_changed == 'true'
        run: |
          chmod +x update_lists.sh
          bash update_lists.sh
          echo "✅ External lists fetched and merged"

      # ── 4. Write the final snapshot for admin UI reconciliation ───────────
      - name: Write all_configs_snapshot.json
        run: |
          node - <<'SCRIPT'
          const fs = require('fs');
          const pending = JSON.parse(fs.readFileSync('database/pending_sync.json', 'utf8'));
          const snapshot = {
            config:       pending.config,
            custom_lists: pending.custom_lists,
            urls:         pending.urls,
            _updated:     Date.now()
          };
          fs.writeFileSync('database/all_configs_snapshot.json', JSON.stringify(snapshot, null, 2));
          console.log('✅ Snapshot written — _updated:', new Date(snapshot._updated).toISOString());
          SCRIPT

      # ── 5. Commit & push everything ────────────────────────────────────────
      - name: Commit and push
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "ℹ️  No file changes detected — snapshot already up to date."
          else
            git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M UTC') — admin config + lists refresh"
            git push
            echo "✅ Changes committed and pushed. Cloudflare Pages deployment will begin automatically."
          fi

      - name: Trigger Deploy Workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering Deploy Workflow..."
          gh workflow run "02 - Deploy Cloudflare Pages Only" --ref ${{ github.ref_name }}

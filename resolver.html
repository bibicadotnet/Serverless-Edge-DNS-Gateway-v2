    <style>
        :root {
            --bg: #f8f9fa;
            --bg-2: #f1f3f5;
            --card: #ffffff;
            --card-hover: #f8f9fa;
            --border: #d0d7de;
            --border-hover: #afb8c1;
            --accent: #0969da;
            --primary: #0969da;
            --accent-glow: rgba(9, 105, 218, 0.1);
            --accent-dim: rgba(9, 105, 218, 0.05);
            --success: #1a7f37;
            --success-bg: #dafbe1;
            --success-border: rgba(31, 35, 40, 0.15);
            --danger: #cf222e;
            --danger-bg: #ffebe9;
            --danger-border: rgba(31, 35, 40, 0.15);
            --warning: #9a6700;
            --warning-bg: #fff8c5;
            --warning-border: rgba(31, 35, 40, 0.15);
            --text: #1f2328;
            --text-2: #656d76;
            --text-3: #8c959f;
            --radius: 6px;
            --radius-sm: 4px;
            --shadow: 0 1px 0 rgba(31, 35, 40, 0.04);
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            --font-display: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
            --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0d1117;
                --bg-2: #161b22;
                --card: #0d1117;
                --card-hover: #161b22;
                --border: #30363d;
                --border-hover: #8b949e;
                --accent: #2f81f7;
                --primary: #2f81f7;
                --accent-glow: rgba(47, 129, 247, 0.15);
                --accent-dim: rgba(47, 129, 247, 0.1);
                --success: #3fb950;
                --success-bg: rgba(46, 160, 67, 0.15);
                --danger: #f85149;
                --danger-bg: rgba(248, 81, 73, 0.15);
                --warning: #d29922;
                --warning-bg: rgba(187, 128, 9, 0.15);
                --text: #e6edf3;
                --text-2: #8b949e;
                --text-3: #7d8590;
                --shadow: 0 1px 0 rgba(1, 4, 9, 0.04);
            }
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 860px; margin: 0 auto; padding: 0 24px; position: relative; }

        /* ─── NAV ─── */
        nav {
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }
        nav .container { display: flex; align-items: center; justify-content: space-between; }
        .logo {
            font-family: var(--font-display);
            font-size: 17px; font-weight: 700;
            color: var(--text); text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            letter-spacing: -0.2px;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent);
        }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .nav-btn {
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-2); text-decoration: none;
            transition: all .2s;
        }
        .nav-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
        .gh-link {
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-2); text-decoration: none;
            transition: border-color .2s, color .2s, background .2s;
        }
        .gh-link:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

        /* ─── HEADER ─── */
        header { text-align: center; margin: 80px 0 48px; }
        h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }
        header p { color: var(--text-2); font-size: 18px; line-height: 1.6; }

        /* ─── SEARCH FORM ─── */
        /* ─── PRIMER BOX ─── */
        .box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .box-body {
            padding: 16px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: end;
        }

        .field-group { display: flex; flex-direction: column; gap: 8px; }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper input {
            padding-right: 44px;
        }

        .btn-toggle-advanced {
            position: absolute;
            right: 8px;
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-3);
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .btn-toggle-advanced:hover {
            color: var(--text);
            background: var(--border);
        }

        .advanced-panel {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 0;
        }
        .advanced-panel.show {
            max-height: 120px;
            opacity: 1;
            margin-top: 16px;
        }

        label {
            font-size: 14px; font-weight: 600; color: var(--text);
        }

        input {
            font-family: var(--font-mono);
            font-size: 15px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 7px 12px;
            width: 100%;
            height: 36px;
            outline: none;
            box-shadow: inset 0 1px 0 rgba(31,35,40,0.05);
        }
        @media (prefers-color-scheme: dark) {
            input { box-shadow: none; }
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        input::placeholder { color: var(--text-3); }

        .btn-resolve {
            font-family: var(--font);
            font-size: 14px;
            font-weight: 600;
            background: #1f883d;
            color: #fff;
            border: 1px solid rgba(31, 35, 40, 0.15);
            border-radius: var(--radius);
            padding: 0 16px;
            height: 36px;
            cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            white-space: nowrap;
            transition: background .2s;
        }
        .btn-resolve:hover { background: #1a7f37; }
        @media (prefers-color-scheme: dark) {
            .btn-resolve { background: #238636; border-color: rgba(240, 246, 252, 0.1); }
            .btn-resolve:hover { background: #2ea043; }
        }
        .btn-resolve:disabled { background: var(--bg-2); color: var(--text-3); cursor: not-allowed; border-color: var(--border); }

        .shortcut-hint {
            font-size: 13px; color: var(--text-2); margin-top: 8px; text-align: center;
        }
        .shortcut-hint kbd {
            background-color: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            display: inline-block;
            font-family: var(--font-mono);
            font-size: 11px;
            line-height: 1.2;
            padding: 2px 5px;
            white-space: nowrap;
            vertical-align: middle;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 640px) {
            .form-row { grid-template-columns: 1fr; }
            .field-group.ecs { min-width: unset; }
            .btn-resolve { width: 100%; justify-content: center; }
        }

        /* ─── STATUS CARD ─── */
        /* ─── STATUS CARD ─── */
        .status-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .status-pill {
            padding: 4px 8px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600;
            display: inline-flex; align-items: center; justify-content: center;
            line-height: 1.2;
            border: 1px solid transparent;
        }
        .status-success { 
            background: rgba(45, 164, 78, 0.15); 
            color: #1a7f37; 
            border-color: rgba(45, 164, 78, 0.4); 
        }
        .status-error { 
            background: rgba(207, 34, 46, 0.1); 
            color: #cf222e; 
            border-color: rgba(207, 34, 46, 0.2); 
        }
        @media (prefers-color-scheme: dark) {
            .status-success { 
                background: rgba(35, 134, 54, 0.15); 
                color: #3fb950; 
                border-color: rgba(35, 134, 54, 0.4); 
            }
            .status-error { 
                background: rgba(248, 81, 73, 0.1); 
                color: #f85149; 
                border-color: rgba(248, 81, 73, 0.2); 
            }
        }
        .status-text { font-size: 14px; font-weight: 400; color: var(--text-2); flex: 1; }
        .status-text.error { 
            color: var(--danger); 
            font-family: var(--font-mono); 
            font-weight: 600;
        }
        .flags-row { display: flex; gap: 4px; flex-wrap: wrap; margin-left: auto; }

        .badge {
            padding: 2px 8px; border-radius: var(--radius-sm);
            font-size: 12px; font-family: var(--font-mono); font-weight: 500;
            border: 1px solid var(--border);
        }
        .badge-on  { background: rgba(45, 164, 78, 0.15); color: #1a7f37; border-color: rgba(45, 164, 78, 0.4); }
        .badge-off { background: var(--bg-2); color: var(--text-3); }
        @media (prefers-color-scheme: dark) {
            .badge-on { background: rgba(35, 134, 54, 0.15); color: #3fb950; border-color: rgba(35, 134, 54, 0.4); }
        }

        /* ─── TABS ─── */
        .tabs-nav-wrapper {
            position: relative;
            margin-bottom: 24px;
            margin-top: 8px;
        }
        .tabs-nav-label {
            position: absolute;
            top: -9px;
            left: 12px;
            background: var(--bg);
            padding: 0 4px;
            font-size: 11px;
            font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 1;
            pointer-events: none;
        }
        .tabs-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 12px;
            justify-content: flex-start;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        @media (prefers-color-scheme: dark) {
            .tabs-nav {
                background: #0d1117;
            }
        }

        .tab-btn {
            font-family: var(--font-mono);
            font-size: 12px;
            line-height: 20px;
            padding: 3px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-2);
            color: var(--text);
            cursor: pointer;
            transition: none;
            white-space: nowrap;
        }
        .tab-btn:hover { 
            background: var(--border);
        }
        .tab-btn.active {
            background: #2da44e;
            color: #ffffff;
            border-color: #2da44e;
        }
        
        /* Record Type Colors (Results Table) */
        .cell-type-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 700;
            line-height: 1;
            color: #ffffff;
            background: var(--text-3);
        }
        .type-A { background: #0969da; }
        .type-AAAA { background: #8250df; }
        .type-CNAME { background: #d4a72c; }
        .type-MX { background: #bf3989; }
        .type-TXT { background: #9a6700; }
        .type-NS { background: #1a7f37; }
        
        @media (prefers-color-scheme: dark) {
            .tab-btn.active {
                background: #238636;
                border-color: #238636;
            }
            .type-A { background: #2f81f7; }
            .type-AAAA { background: #a371f7; }
            .type-CNAME { background: #d29922; }
            .type-MX { background: #db61a2; }
            .type-TXT { background: #d29922; }
            .type-NS { background: #3fb950; }
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn .25s ease; }

        /* ─── RESULT SECTIONS ─── */
        /* ─── RESULT SECTIONS (GitHub Box Style) ─── */
        .result-section {
            position: relative;
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 32px;
            margin-top: 12px;
        }
        @media (prefers-color-scheme: dark) {
            .result-section { background: #0d1117; }
        }
        .section-label {
            position: absolute;
            top: -9px;
            left: 12px;
            background: var(--bg);
            padding: 0 4px;
            font-size: 11px;
            font-weight: 700;
            color: var(--success);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 1;
            pointer-events: none;
        }
        .section-title { display: none; } /* Deprecated in favor of section-label */

        .table-wrapper { 
            overflow: visible; 
            padding-top: 4px;
        }
        @media (max-width: 640px) {
            .table-wrapper { overflow-x: auto; } /* Only scroll on mobile */
        }

        table.data-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        table.data-table th {
            padding: 8px 16px;
            background: #ffffff;
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: left;
        }
        @media (prefers-color-scheme: dark) {
            table.data-table th { background: #0d1117; }
        }
        table.data-table td {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text);
            vertical-align: middle;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        table.data-table tr:last-child td { border-bottom: none; }
        table.data-table tbody td:hover { background: var(--card-hover); }

        .cell-name { font-weight: 400; color: var(--accent); font-family: var(--font-mono); font-size: 15px; word-break: break-all; }
        .cell-ttl  { font-family: var(--font-mono); font-size: 14px; color: var(--text-2); white-space: nowrap; padding-left: 8px !important; padding-right: 8px !important; }
        .cell-type { font-family: var(--font-mono); font-size: 14px; font-weight: 400; color: var(--text-2); white-space: nowrap; padding-left: 8px !important; padding-right: 8px !important; }
        .cell-data { font-family: var(--font-mono); font-size: 15px; word-break: break-all; }

        /* ─── COPY ANIMATION & TOAST ─── */
        @keyframes copyFlash {
            0% { background: rgba(29,110,234,0.15); }
            100% { background: transparent; }
        }
        .copy-flash { animation: copyFlash .6s ease-out !important; }

        .copy-toast {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 8px;

        .tab-loader .spinner { width: 22px; height: 22px; border: 3px solid rgba(29,110,234,0.15); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }

            80% { opacity: 1; transform: translate(-50%, -12px); }
            100% { opacity: 0; transform: translate(-50%, -20px); }

    <script>
        const form = document.getElementById('dns-form');
        const input = document.getElementById('domain-input');
        const ecsInput = document.getElementById('ecs-input');
        const btn = document.getElementById('btn-submit');
        const btnToggle = document.getElementById('btn-toggle-advanced');
        const advancedPanel = document.getElementById('advanced-panel');
        const loader = document.getElementById('loader');
        const container = document.getElementById('result-container');
        const errorBox = document.getElementById('error-box');
        const errorMsg = document.getElementById('error-msg');
        const toast = document.getElementById('copy-toast');

        // State for lazy loading
        window._dnsCache = {};
        window._currentDomain = '';
        window._currentECS = '';

        btnToggle.addEventListener('click', () => {
            const isShowing = advancedPanel.classList.toggle('show');
            btnToggle.classList.toggle('active', isShowing);
        });

        const COMMON_TYPES = [
            'A', 'AAAA', 'CNAME', 'MX', 'TXT', 'NS', 'SOA', 'SRV', 'HTTPS', 'SVCB', 
            'CAA', 'DS', 'DNSKEY', 'PTR', 'SPF', 'NAPTR', 'SSHFP', 'TLSA', 'DNAME', 
            'RRSIG', 'NSEC', 'NSEC3', 'NSEC3PARAM', 'CDNSKEY', 'CDS', 'CERT', 
            'HINFO', 'IPSECKEY', 'KEY', 'RP', 'SIG', 'WKS'
        ];


        function showCopyToast(msg) {
            // Deprecated in favor of showInstantTooltip, but kept for non-element messages
            toast.textContent = msg || 'Copied to clipboard';
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function showInstantTooltip(el, msg = 'Copied!') {
            const rect = el.getBoundingClientRect();
            const tooltip = document.createElement('div');
            tooltip.className = 'copy-tooltip';
            tooltip.textContent = msg;
            document.body.appendChild(tooltip);
            
            tooltip.style.left = `${rect.left + rect.width / 2}px`;
            tooltip.style.top = `${rect.top}px`;
            
            setTimeout(() => tooltip.remove(), 1000);
        }

        window.copyJSONData = (btn) => {
            const content = document.getElementById('tab-JSON')._jsonRaw;
            if (!content) return;
            navigator.clipboard.writeText(content).then(() => {
                const originalHTML = btn.innerHTML;
                btn.innerHTML = `<svg aria-hidden="true" height="16" viewBox="0 0 16 16" width="16" fill="currentColor" style="color: #1a7f37;"><path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.751.751 0 0 1 .018-1.042.751.751 0 0 1 1.042-.018L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"></path></svg>`;
                showInstantTooltip(btn, 'Copied JSON!');
                setTimeout(() => btn.innerHTML = originalHTML, 2000);
            });
        };

        function setupCellCopy(element) {
            element.querySelectorAll('table.data-table tbody td').forEach(cell => {
                cell.addEventListener('click', (e) => {
                    const content = cell.dataset.copyValue || cell.textContent.trim();
                    if (!content) return;

                    navigator.clipboard.writeText(content).then(() => {
                        cell.classList.remove('copy-flash');
                        void cell.offsetWidth;
                        cell.classList.add('copy-flash');
                        const preview = content.length > 15 ? content.substring(0, 15) + '...' : content;
                        showInstantTooltip(cell, `Copied: ${preview}`);
                        setTimeout(() => cell.classList.remove('copy-flash'), 600);
                    });
                });
            });
        }

        async function fetchIpGeo(ip) {
            const cacheKey = `geo_cache_${ip}`;
            const cached = sessionStorage.getItem(cacheKey);
            if (cached) return JSON.parse(cached);

            try {
                // Try ipinfo.io first as it has better city data for Anycast
                const res = await fetch(`https://ipinfo.io/${ip}/json`, { signal: AbortSignal.timeout(2000) }).then(r => r.json());
                const data = {
                    city: res.city || null,
                    isp: res.org || null,
                    asn: '', // ipinfo 'org' usually already contains ASN
                    country: res.country || null
                };
                sessionStorage.setItem(cacheKey, JSON.stringify(data));
                return data;
            } catch (e) {
                try {
                    // Fallback to ip.sb
                    const res = await fetch(`https://api.ip.sb/geoip/${ip}`, { signal: AbortSignal.timeout(2000) }).then(r => r.json());
                    const data = {
                        city: res.city || null,
                        isp: res.asn_organization || null,
                        asn: res.asn ? `AS${res.asn}` : '',
                        country: res.country || res.country_code || null
                    };
                    sessionStorage.setItem(cacheKey, JSON.stringify(data));
                    return data;
                } catch (e2) { return null; }
            }
        }

        function initGeoTooltips(element) {
            const ipCells = element.querySelectorAll('.cell-data.ip-addr');
            ipCells.forEach(async cell => {
                const ip = cell.dataset.ip;
                if (!ip) return;

                const loadData = async () => {
                    const linesEl = cell.querySelector('.geo-info-lines');
                    if (!linesEl || linesEl.dataset.loaded === 'true') return;

                    const data = await fetchIpGeo(ip);
                    if (data) {
                        let html = '';
                        // 1. Location line: City, Country
                        let locParts = [];
                        if (data.city && !data.city.toLowerCase().includes('unknown')) locParts.push(data.city);
                        if (data.country && !data.country.toLowerCase().includes('unknown')) locParts.push(data.country);
                        
                        if (locParts.length > 0) {
                            html += `<div class="geo-line">${locParts.join(', ')}</div>`;
                        }
                        
                        // 2. ISP / Org line
                        if (data.isp && !data.isp.toLowerCase().includes('unknown')) {
                            const ispName = (data.asn ? data.asn + ' ' : '') + data.isp;
                            html += `<div class="geo-line">${ispName}</div>`;
                        }
                        
                        linesEl.innerHTML = html;
                        linesEl.dataset.loaded = 'true';
                    } else {
                        linesEl.innerHTML = '';
                    }
                };

                loadData();
            });
        }

        async function fetchDNS(domain, type, ecs) {
            const typeInt = NAME_TO_TYPE[type] || type;
            let fetchUrl = `/dns-query?name=${encodeURIComponent(domain)}&type=${typeInt}`;
            if (ecs) fetchUrl += `&edns_client_subnet=${encodeURIComponent(ecs)}`;
            
            // Tight 5 second timeout for DNS queries
            const response = await fetch(fetchUrl, { signal: AbortSignal.timeout(5000) });
            if (!response.ok) throw new Error('API request failed');
            return await response.json();
        }

        // (label positioning not needed - using static labels)


        // DNS Class Mapping
        const CLASS_MAP = {
            1: 'IN (Internet)',
            3: 'CH (Chaos)',
            4: 'HS (Hesiod)',
            254: 'NONE',
            255: 'ANY (*)'
        };

        // DNS OpCode Mapping
        const OPCODE_MAP = {
            0: 'Query',
            1: 'IQuery',
            2: 'Status',
            4: 'Notify',
            5: 'Update',
            6: 'DSO'
        };

        // DNS Type Mapping (Comprehensive RFC-based mapping)
        const TYPE_MAP = {
            1: 'A', 2: 'NS', 3: 'MD', 4: 'MF', 5: 'CNAME', 6: 'SOA', 7: 'MB', 8: 'MG', 9: 'MR', 10: 'NULL',
            11: 'WKS', 12: 'PTR', 13: 'HINFO', 14: 'MINFO', 15: 'MX', 16: 'TXT', 17: 'RP', 18: 'AFSDB', 19: 'X25', 20: 'ISDN',
            21: 'RT', 22: 'NSAP', 23: 'NSAP-PTR', 24: 'SIG', 25: 'KEY', 26: 'PX', 27: 'GPOS', 28: 'AAAA', 29: 'LOC', 30: 'NXT',
            31: 'EID', 32: 'NIMLOC', 33: 'SRV', 34: 'ATMA', 35: 'NAPTR', 36: 'KX', 37: 'CERT', 38: 'A6', 39: 'DNAME', 40: 'SINK',
            41: 'OPT', 42: 'APL', 43: 'DS', 44: 'SSHFP', 45: 'IPSECKEY', 46: 'RRSIG', 47: 'NSEC', 48: 'DNSKEY', 49: 'DHCID', 50: 'NSEC3',
            51: 'NSEC3PARAM', 52: 'TLSA', 53: 'SMIMEA', 55: 'HIP', 56: 'NINFO', 57: 'RKEY', 58: 'TALINK', 59: 'CDS', 60: 'CDNSKEY',
            61: 'OPENPGPKEY', 62: 'CSYNC', 63: 'ZONEMD', 64: 'SVCB', 65: 'HTTPS', 66: 'DSYNC', 67: 'HHIT', 68: 'BRID', 99: 'SPF', 100: 'UINFO',
            101: 'UID', 102: 'GID', 103: 'UNSPEC', 104: 'NID', 105: 'L32', 106: 'L64', 107: 'LP', 108: 'EUI48', 109: 'EUI64', 128: 'NXNAME',
            249: 'TKEY', 250: 'TSIG', 251: 'IXFR', 252: 'AXFR', 253: 'MAILB', 254: 'MAILA', 255: '*', 256: 'URI', 257: 'CAA', 258: 'AVC',
            259: 'DOA', 260: 'AMTRELAY', 261: 'RESINFO', 262: 'WALLET', 263: 'CLA', 264: 'IPN', 32768: 'TA', 32769: 'DLV'
        };

        const NAME_TO_TYPE = Object.fromEntries(Object.entries(TYPE_MAP).map(([k, v]) => [v, parseInt(k)]));

        // DNS Status (RCODE) Mapping
        const RCODE_MAP = {
            0: { name: 'NOERROR', desc: 'DNS Query completed successfully' },
            1: { name: 'FORMERR', desc: 'DNS Query Format Error' },
            2: { name: 'SERVFAIL', desc: 'Server failed to complete the DNS request' },
            3: { name: 'NXDOMAIN', desc: 'Domain name does not exist' },
            4: { name: 'NOTIMP', desc: 'Function not implemented' },
            5: { name: 'REFUSED', desc: 'The server refused to answer for the query' },
            6: { name: 'YXDOMAIN', desc: 'Name that can not exist, does exist' },
            7: { name: 'YXRRSET', desc: 'RRset that can not exist, does exist' },
            8: { name: 'NXRRSET', desc: 'RR Set that should exist does not' },
            9: { name: 'NOTAUTH', desc: 'Server not authoritative for the zone' },
            10: { name: 'NOTZONE', desc: 'Name not in zone' },
            11: { name: 'DSOTYPENI', desc: 'DSO-TYPE Not Implemented' },
            12: { name: 'Unassigned', desc: 'Unassigned' },
            13: { name: 'Unassigned', desc: 'Unassigned' },
            14: { name: 'Unassigned', desc: 'Unassigned' },
            15: { name: 'Unassigned', desc: 'Unassigned' },
            16: { name: 'BADVERS', desc: 'Bad OPT Version / TSIG Signature Failure' },
            17: { name: 'BADKEY', desc: 'Key not recognized' },
            18: { name: 'BADTIME', desc: 'Signature out of time window' },
            19: { name: 'BADMODE', desc: 'Bad TKEY Mode' },
            20: { name: 'BADNAME', desc: 'Duplicate key name' },
            21: { name: 'BADALG', desc: 'Algorithm not supported' },
            22: { name: 'BADTRUNC', desc: 'Bad Truncation' },
            23: { name: 'BADCOOKIE', desc: 'Bad/missing Server Cookie' }

        async function updateTLDs() {
            try {
                // Try to load from localStorage first
                const cached = localStorage.getItem('iana_tlds');
                if (cached) {
                    const parsed = JSON.parse(cached);
                    if (Date.now() - parsed.ts < 86400000) { // 24h cache
                        IANA_TLDS = new Set(parsed.data);
                    }
                }

                // Fetch latest from IANA
                const response = await fetch('https://data.iana.org/TLD/tlds-alpha-by-domain.txt');
                if (response.ok) {
                    const text = await response.text();
                    const lines = text.split('\n').filter(line => line && !line.startsWith('#'));
                    IANA_TLDS = new Set(lines.map(l => l.trim().toUpperCase()));
                    localStorage.setItem('iana_tlds', JSON.stringify({
                        ts: Date.now(),
                        data: Array.from(IANA_TLDS)
                    }));
                }
            } catch (e) {
                console.log('IANA TLD update failed (CORS or Network), using fallback.');
            }
        }

        // IP / CIDR Validation
        function isValidIP(ip) {
            const v4 = /^(\d{1,3}\.){3}\d{1,3}$/;
            const v6 = /^([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:)|fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}|::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])|([0-9a-fA-F]{1,4}:){1,4}:((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])$/;
            return v4.test(ip) || v6.test(ip);
        }

        function ipToReverseDomain(ip) {
            if (ip.includes(':')) {
                // IPv6
                let expanded = ip;
                if (ip.includes('::')) {
                    const [head, tail] = ip.split('::');
                    const headParts = head ? head.split(':') : [];
                    const tailParts = tail ? tail.split(':') : [];
                    const missing = 8 - (headParts.length + tailParts.length);
                    expanded = headParts.concat(Array(missing).fill('0')).concat(tailParts).join(':');
                } else {
                    const parts = ip.split(':');
                    if (parts.length < 8) {
                        expanded = parts.concat(Array(8 - parts.length).fill('0')).join(':');
                    }
                }
                const parts = expanded.split(':').map(p => p.padStart(4, '0'));
                return parts.join('').split('').reverse().join('.') + '.ip6.arpa';
            } else {
                // IPv4
                return ip.split('.').reverse().join('.') + '.in-addr.arpa';
            }

        function isValidECS(ecs) {
            if (!ecs) return true;
            const parts = ecs.split('/');
            if (parts.length > 2) return false;
            if (!isValidIP(parts[0])) return false;
            if (parts.length === 2) {
                const prefix = parseInt(parts[1]);
                if (isNaN(prefix)) return false;
                const isV6 = parts[0].includes(':');
                if (isV6) return prefix >= 0 && prefix <= 128;
                return prefix >= 0 && prefix <= 32;
            }
            return true;

            if (!str) return '';
            return String(str).replace(/[&<>"']/g, m => ({

        form.addEventListener('submit', async (e) => {

            let domain = input.value.trim();

            if (!domain) {
                showError('Please enter a domain name to resolve.');

            // Sanitization

                if (domain.includes('://')) {
                    domain = new URL(domain).hostname;
                } else {
                    domain = domain.split('/')[0].split('?')[0];
                }
            } catch (err) {
                domain = domain.split('/')[0];
            }
            
            domain = domain.toLowerCase();

            // Auto-convert IP to reverse DNS domain and switch to PTR/NAPTR
            const checkIP = domain.endsWith('.') ? domain.slice(0, -1) : domain;
            if (isValidIP(checkIP)) {
                domain = ipToReverseDomain(checkIP);
                input.value = domain;
                
                const activeBtn = document.querySelector('.tab-btn.active');
                const currentType = window._initialType || (activeBtn ? activeBtn.dataset.type : 'A');
                if (currentType !== 'PTR' && currentType !== 'NAPTR') {
                    window._initialType = 'PTR';

            // Auto-convert IDN (Unicode) to Punycode conversion
            if (/[^\x00-\x7F]/.test(domain)) {

                    domain = converted;
                } catch (e) {
                    showError('Invalid Unicode domain name');
                    return;
                }
            }

            input.value = domain;

            // Validation (Detailed breakdown of the strict Regex)
            if (domain.length > 255) {
                showError('Domain name too long (max 255 characters)');
                return;
            }

            if (domain.startsWith('.')) {
                showError('Domain cannot start with a dot');
                return;
            }

            const labels = domain.split('.');
            if (labels.length < 2) {
                showError('Domain must contain at least one dot (e.g., example.com)');
                return;
            }

            for (let i = 0; i < labels.length; i++) {
                const label = labels[i];
                if (label.length === 0) {
                    // Allow empty label only at the very end (trailing dot)
                    if (i === labels.length - 1 && i > 0) continue;
                    showError('Invalid structure: contains empty label (..)');
                    return;
                }
                if (label.length > 63) {
                    showError('Label too long: "' + label.substring(0, 10) + '..." (max 63 chars)');
                    return;
                }
                if (label.startsWith('-') || label.endsWith('-')) {
                    showError('Labels cannot start or end with a hyphen: "' + label + '"');
                    return;
                }
                if (!/^[a-z0-9-]+$/i.test(label)) {
                    showError('Label contains invalid characters: "' + label + '"');
                    return;
                }
                // Check if last non-empty label (TLD) is at least 2 characters and exists in IANA list
                const isLast = (i === labels.length - 1) || (i === labels.length - 2 && labels[labels.length - 1] === '');
                if (isLast) {
                    if (label.length < 2) {
                        showError('Invalid TLD: Top-level domain must be at least 2 characters');
                        return;
                    }
                    if (!IANA_TLDS.has(label.toUpperCase())) {
                        showError(`Invalid TLD: ".${label.toLowerCase()}" is not a recognized top-level domain`);
                        return;
                    }
                }
            }

            // Final check with the strict regex as source of truth
            if (!domainRegex.test(domain)) {
                showError('Invalid domain format (RFC compliant check failed)');
                return;
            }

            // ECS Validation
            if (ecs && !isValidECS(ecs)) {
                showError('Invalid EDNS Client Subnet. Must be an IP or CIDR.');
                return;
            }

            // Update URL
            const url = new URL(window.location);
            url.searchParams.set('name', domain);
            if (ecs) url.searchParams.set('edns_client_subnet', ecs);

            loader.style.display = 'flex';
            container.style.display = 'none';

                // Determine current active type or default to 'A' (prioritize window._initialType on first load)
                const activeBtn = document.querySelector('.tab-btn.active');
                let activeType = window._initialType || (activeBtn ? activeBtn.dataset.type : 'A');

                const dnsType = activeType === 'JSON' ? 'A' : activeType;

                showError('Failed to fetch DNS data. Please check your connection or try again.');

            } finally {

                btn.disabled = false;
            }
        });

        window.addEventListener('load', () => {

        function renderResults(dnsData, activeType = 'A') {
            // Status and Flags from the primary record fetched
            const pill = document.getElementById('status-pill');
            const statusInfo = RCODE_MAP[dnsData.Status] || { name: 'UNKNOWN', desc: 'Unknown error code' };
            pill.textContent = statusInfo.name;
            pill.className = `status-pill ${dnsData.Status === 0 ? 'status-success' : 'status-error'}`;
            
            const descEl = document.getElementById('status-desc');
            if (dnsData.Status === 0) {
                descEl.style.display = 'none';
            } else {
                descEl.textContent = statusInfo.desc;
                descEl.style.display = 'block';
                descEl.classList.toggle('error', true);
            }

            const flagsRow = document.getElementById('flags-container');
            const flags = [
                { key: 'AA', label: 'AA', desc: 'Authoritative Answer' },
                { key: 'TC', label: 'TC', desc: 'Truncated' },
                { key: 'RD', label: 'RD', desc: 'Recursion Desired' },
                { key: 'RA', label: 'RA', desc: 'Recursion Available' },
                { key: 'AD', label: 'AD', desc: 'Authentic Data' },
                { key: 'CD', label: 'CD', desc: 'Checking Disabled' }
            ];
            flagsRow.innerHTML = flags.map(f => `
                <div class="badge ${dnsData[f.key] ? 'badge-on' : 'badge-off'}" title="${f.desc}">
                    ${f.label}
                </div>
            `).join('');

            // Render Tabs
            const tabsNav = document.getElementById('tabs-nav');
            const tabsNavWrapper = document.getElementById('tabs-nav-wrapper');
            const tablesContainer = document.getElementById('tables-container');
            tabsNav.innerHTML = '';
            tablesContainer.innerHTML = '';
            tabsNavWrapper.style.display = 'block';

            // Create tabs for common types
            COMMON_TYPES.forEach(type => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${type === activeType ? 'active' : ''}`;
                btn.textContent = type;
                btn.dataset.type = type;
                btn.onclick = () => activateTab(type);
                tabsNav.appendChild(btn);

                const tabContent = document.createElement('div');
                tabContent.className = `tab-content ${type === activeType ? 'active' : ''}`;
                tabContent.id = `tab-${type}`;
                
                if (type === activeType) {
                    tabContent.innerHTML = buildTableHTML(dnsData);
                    setupCellCopy(tabContent);
                    initGeoTooltips(tabContent);
                }
                tablesContainer.appendChild(tabContent);
            });

            // JSON Tab
            const jsonBtn = document.createElement('button');
            jsonBtn.className = `tab-btn ${activeType === 'JSON' ? 'active' : ''}`;
            jsonBtn.textContent = 'JSON';
            jsonBtn.dataset.type = 'JSON';
            jsonBtn.onclick = () => activateTab('JSON');
            tabsNav.appendChild(jsonBtn);

            const jsonContent = document.createElement('div');
            jsonContent.className = `tab-content ${activeType === 'JSON' ? 'active' : ''}`;
            jsonContent.id = 'tab-JSON';
            tablesContainer.appendChild(jsonContent);

            if (activeType === 'JSON') {
                activateTab('JSON'); // Use activateTab to trigger the full JSON loading logic
            }

            container.style.display = 'block';
        }

        async function activateTab(type) {
            // UI Switch
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', b.textContent === type);
            });
            document.querySelectorAll('.tab-content').forEach(c => {
                c.classList.toggle('active', c.id === `tab-${type}`);
            });

            // Update Browser URL (Safe sync)
            const url = new URL(window.location);
            if (type !== 'A') {
                url.searchParams.set('type', type);
            } else {
                url.searchParams.delete('type');
            }
            window.history.replaceState({}, '', url);

            const contentEl = document.getElementById(`tab-${type}`);
            if (!contentEl) return;

            // If already loaded or JSON (needs all)
            if (type === 'JSON') {
                if (contentEl.innerHTML) return;
                contentEl.innerHTML = '<div class="tab-loader"><div class="spinner"></div></div>';
                
                try {
                    // Fetch all missing common types for JSON view
                    const promises = COMMON_TYPES.map(async t => {
                        if (window._dnsCache[t]) return { type: t, data: window._dnsCache[t] };
                        const data = await fetchDNS(window._currentDomain, t, window._currentECS);
                        window._dnsCache[t] = data;
                        return { type: t, data };
                    });
                    const allResults = await Promise.all(promises);
                    const jsonString = JSON.stringify(allResults, null, 2);
                    const copyIcon = `<svg aria-hidden="true" height="16" viewBox="0 0 16 16" width="16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path></svg>`;
                    contentEl.innerHTML = `
                        <div class="result-section">
                            <span class="section-label">Raw JSON Data</span>
                            <div style="position: absolute; top: 12px; right: 12px;">
                                <button class="copy-btn-json" id="json-copy-btn" onclick="copyJSONData(this)" title="Copy JSON">${copyIcon}</button>
                            </div>
                            <div class="json-container" style="padding: 16px; margin-top: 8px; cursor: pointer; transition: background 0.2s;" onclick="copyJSONData(document.getElementById('json-copy-btn'))">
                                <pre id="json-pre" style="margin: 0; font-size: 13px; color: var(--text); white-space: pre-wrap; word-break: break-all;">${escapeHTML(jsonString)}</pre>
                            </div>
                        </div>
                    `;
                    contentEl._jsonRaw = jsonString;
                } catch (e) {
                    contentEl.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--danger)">Failed to load JSON data.</div>';
                }
                return;
            }

            if (contentEl.innerHTML) return; // Already loaded

            // Lazy load single type
            contentEl.innerHTML = '<div class="tab-loader"><div class="spinner"></div></div>';
            try {
                const data = await fetchDNS(window._currentDomain, type, window._currentECS);
                window._dnsCache[type] = data;
                contentEl.innerHTML = buildTableHTML(data);
                setupCellCopy(contentEl);
                initGeoTooltips(contentEl);
            } catch (e) {
                contentEl.innerHTML = `<div style="padding: 20px; text-align: center; color: var(--danger)">Failed to load ${type} records.</div>`;
            }
        }

        function buildTableHTML(data) {
            let html = '';
            
            const renderSection = (title, items) => {
                if (!items || items.length === 0) return '';
                const isQ = title === 'Question';
                return `
                <div class="result-section">
                    <span class="section-label">${title}</span>
                    <div class="table-wrapper">
                        <table class="data-table">
                            <colgroup>
                                <col style="width: 35%">
                                <col style="width: 90px">
                                ${!isQ ? '<col style="width: 60px">' : ''}
                                ${!isQ ? '<col>' : ''}
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th class="cell-type">Type</th>
                                    ${!isQ ? '<th class="cell-ttl">TTL</th>' : ''}
                                    ${!isQ ? '<th>Data</th>' : ''}
                                </tr>
                            </thead>
                            <tbody>
                                ${items.map(item => {
                                    const isIP = !isQ && (item.type === 1 || item.type === 28) && isValidIP(item.data);
                                    return `
                                <tr>
                                    <td class="cell-name">${escapeHTML(item.name)}</td>
                                    <td class="cell-type">
                                        <span class="cell-type-badge type-${TYPE_MAP[item.type] || item.type}">
                                            ${TYPE_MAP[item.type] || item.type}
                                        </span>
                                    </td>
                                    ${!isQ ? `<td class="cell-ttl">${item.TTL}</td>` : ''}
                                    ${!isQ ? `
                                        <td class="cell-data ip-addr" data-ip="${isIP ? item.data : ''}" data-copy-value="${escapeHTML(item.data)}">
                                            ${isIP ? `
                                                <div class="geo-ip-container ${item.data.includes(':') ? 'is-ipv6' : ''}">
                                                    <div class="ip-text">${escapeHTML(item.data)}</div>
                                                    <div class="geo-info-lines"><span class="geo-loading-inline">...</span></div>
                                                </div>
                                            ` : escapeHTML(item.data)}
                                        </td>
                                    ` : ''}
                                </tr>`;}).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            };

            html += renderSection('Question', data.Question);
            html += renderSection('Answer', data.Answer);
            html += renderSection('Authority', data.Authority);
            html += renderSection('Additional', data.Additional);

            if (html === '' && data.Status === 0) {
                html = `<div class="result-section"><div style="text-align: center; padding: 48px; color: var(--text-3); font-size: 14px;">No records found</div></div>`;
            }

            return html;
        }

        // ── Dynamic Host ──
        const host = location.host;
        document.querySelectorAll('.host-name').forEach(el => el.textContent = host);
        document.title = `${host} — DNS Resolver Tool`;
    </script>
</body>
</html>
